<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="base.css">
<style>
  /* Key light: teal dominant — Vision identity */
  .bg {
    background:
      radial-gradient(ellipse 1200px 700px at 50% -80px,  rgba(255,255,255,.065) 0%, transparent 70%),
      radial-gradient(ellipse 900px 700px at -100px 800px, rgba(78,224,192,.15)   0%, transparent 65%),
      radial-gradient(ellipse 600px 400px at 1380px 600px, rgba(91,140,255,.08)   0%, transparent 60%),
      radial-gradient(ellipse 1000px 500px at 50% 2850px,  rgba(78,224,192,.07)   0%, transparent 70%);
  }
  .kicker { color: #3ddbb8; }
  .h1 em  { font-style: normal; color: #3ddbb8; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="shot">
  <div class="brand">
    <img src="../logo.png" alt="CarAI">
    <span class="brand-name">CarAI</span>
  </div>
  <p class="kicker">CarAI Vision · Gratis</p>
  <h1 class="h1">¿Qué coche es ese?<br><em>Apúntale y descúbrelo.</em></h1>
  <p class="sub">Marca, modelo y generación al instante,<br>sin pagar nada. Hasta 10 escaneos al día.</p>
</div>
<div class="device">
  <div class="iphone">
    <div class="island"></div>
    <img src="../screens/vision-4.jpg" alt="CarAI Vision — identificación">
  </div>
</div>
</body>
</html>
