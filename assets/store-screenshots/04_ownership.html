<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="base.css">
<style>
  /* Key light: warm-blue — Ownership cost reality */
  .bg {
    background:
      radial-gradient(ellipse 1200px 700px at 50% -80px,  rgba(255,255,255,.07)  0%, transparent 70%),
      radial-gradient(ellipse 900px 700px at -100px 900px, rgba(91,140,255,.11)   0%, transparent 65%),
      radial-gradient(ellipse 600px 450px at 1380px 600px, rgba(255,180,80,.06)   0%, transparent 60%),
      radial-gradient(ellipse 1000px 500px at 50% 2850px,  rgba(91,140,255,.06)   0%, transparent 70%);
  }
  .kicker { color: #5b8cff; }
  .h1 em  { font-style: normal; color: #5b8cff; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="shot">
  <div class="brand">
    <img src="../logo.png" alt="CarAI">
    <span class="brand-name">CarAI</span>
  </div>
  <p class="kicker">Ownership Intelligence</p>
  <h1 class="h1">Cuánto cuesta<br><em>de verdad cada coche.</em></h1>
  <p class="sub">Combustible, mantenimiento, seguro y más —<br>desglosado sin sorpresas, al mes y al año.</p>
</div>
<div class="device">
  <div class="iphone">
    <div class="island"></div>
    <img src="../screens/ownership-intelligence.jpg" alt="Ownership Intelligence — CarAI">
  </div>
</div>
</body>
</html>
