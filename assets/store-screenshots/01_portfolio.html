<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="base.css">
<style>
  /* Key light: blue-left / teal-right */
  .bg {
    background:
      radial-gradient(ellipse 1200px 700px at 50% -80px,  rgba(255,255,255,.07)  0%, transparent 70%),
      radial-gradient(ellipse 900px 700px at -100px 900px, rgba(91,140,255,.13)   0%, transparent 65%),
      radial-gradient(ellipse 700px 500px at 1380px 700px, rgba(78,224,192,.09)   0%, transparent 60%),
      radial-gradient(ellipse 1000px 500px at 50% 2850px,  rgba(91,140,255,.07)   0%, transparent 70%);
  }
  /* Accent on headline */
  .h1 em { font-style: normal; color: #4ee0c0; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="shot">
  <div class="brand">
    <img src="../logo.png" alt="CarAI">
    <span class="brand-name">CarAI</span>
  </div>
  <p class="kicker">Portfolio</p>
  <h1 class="h1">Toda tu colección,<br><em>valorada al céntimo.</em></h1>
  <p class="sub">Valor de mercado actualizado en tiempo real<br>para cada coche de tu garaje.</p>
</div>
<div class="device">
  <div class="iphone">
    <div class="island"></div>
    <img src="../screens/mi-coleccion.jpg" alt="Mi Colección — CarAI">
  </div>
</div>
</body>
</html>
