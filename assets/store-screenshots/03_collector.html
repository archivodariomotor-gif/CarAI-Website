<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="base.css">
<style>
  /* Key light: blue-purple — Collector Intelligence */
  .bg {
    background:
      radial-gradient(ellipse 1200px 700px at 50% -80px,  rgba(255,255,255,.065) 0%, transparent 70%),
      radial-gradient(ellipse 900px 700px at -100px 800px, rgba(140,91,255,.12)   0%, transparent 65%),
      radial-gradient(ellipse 600px 450px at 1380px 700px, rgba(91,140,255,.10)   0%, transparent 60%),
      radial-gradient(ellipse 1000px 500px at 50% 2850px,  rgba(140,91,255,.06)   0%, transparent 70%);
  }
  .kicker { color: #9b6aff; }
  .h1 em  { font-style: normal; color: #9b6aff; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="shot">
  <div class="brand">
    <img src="../logo.png" alt="CarAI">
    <span class="brand-name">CarAI</span>
  </div>
  <p class="kicker">Collector Intelligence</p>
  <h1 class="h1">Tres escenarios.<br><em>Una decisión clara.</em></h1>
  <p class="sub">Conservador, realista y optimista — CarAI<br>cierra con su propia conclusión para cada coche.</p>
</div>
<div class="device">
  <div class="iphone">
    <div class="island"></div>
    <img src="../screens/collector-intelligence.jpg" alt="Collector Intelligence — CarAI">
  </div>
</div>
</body>
</html>
